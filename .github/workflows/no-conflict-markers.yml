name: no-conflict-markers
on:
  push:
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject unresolved merge markers
        run: bash scripts/forbid-conflict-markers.sh

  sha256-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid malformed SHA-256 fields
        run: bash scripts/forbid-malformed-sha256.sh
